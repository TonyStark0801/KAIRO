ollama:
  host: localhost
  port: 11434
  model: qwen2.5:7b
  fast_model: qwen2.5:7b
  embed_model: nomic-embed-text

stt:
  engine: mlx-whisper
  model: small.en        # command transcription
  wake_model: small.en   # wake-word too — tiny.en accuracy is insufficient for Indian English
  cpp_fallback_model: small.en
  # mlx-whisper bias — same idea as newThing/test.py (Indian English, coding context).
  initial_prompt: "A software engineer in Mumbai speaking Indian English about coding."

vad:
  # Silero VAD pre-filter — rejects non-speech audio (TV, music, keyboard,
  # coughing, clatter) BEFORE it hits Whisper or speaker verification.
  # Significantly reduces wake-word noise from ambient sources. ~30MB ONNX.
  enabled: true
  min_speech_prob: 0.5

speaker_id:
  enabled: true
  voiceprint_path: ~/.kairo/voiceprint.npy
  threshold: 0.20
  # Reject any audio not matching the enrolled voiceprint. Rejects include:
  # - Mira's own TTS output (self-echo)
  # - TV / music / other humans in the room
  # Disable by setting enabled: false if you haven't enrolled yet.

# Mic: auto = sounddevice if scipy+sounddevice installed (same as newThing), else PyAudio.
# sounddevice path feeds the daemon agent / reasoner / LLM / TTS unchanged (VoiceTranscriptEvent).
mic:
  backend: auto
  sd_threshold: 0.04
  sd_silence_chunks: 10
  sd_chunk_seconds: 0.1
  sd_min_duration_seconds: 0.25
  sd_show_meter: false

wake:
  # Two-stage pipeline:
  #   Stage 1 — openWakeWord neural detector (frame-by-frame, <1ms, always running)
  #             Uses alexa/hey_mycroft as acoustic proxy for "hey kairo" — similar
  #             two-syllable pattern. Low threshold (0.3) for high recall; Stage 2 rejects FPs.
  #   Stage 2 — Whisper confirmation on the 1.5s audio buffer captured by OWW.
  #             Only fires the wake event if "kairo" (or variant) is heard.
  #             Cuts false positives from ambient speech, TV, room conversation.
  #
  # Fallback: set engine: stt_keyword if openwakeword install fails.
  engine: openwakeword
  openwakeword_models: []       # empty = use bundled default models (alexa, hey_mycroft, etc.)
  openwakeword_threshold: 0.65  # stricter — cuts TV / family / ambient from reaching Stage 2 Whisper
  openwakeword_inference_framework: tflite
  # Stage 2 Whisper confirmation — set false to disable and trust OWW alone
  oww_whisper_verify: true

session:
  idle_timeout: 90
  wake_window: 10
  tool_timeout: 30

memory:
  chroma_path: ~/.kairo/chroma
  behavioral_db: ~/.kairo/behavior.db

redis:
  redis_enabled: false
  url: redis://localhost:6379/0

paths:
  face_embedding_path: ~/.kairo/face_embedding.npy

browser:
  app_name: "Brave Browser"

projects:
  office:
    name: Office Dashboard
    path: ~/Projects/office-dashboard
    intellij_module: office-dashboard
  codejam:
    name: CodeJam Solutions
    path: ~/Projects/codejam
    intellij_module: codejam
  personal:
    name: Personal Site
    path: ~/Projects/personal-site
    intellij_module: null

groq:
  api_key_env: GROQ_API_KEY
  model: llama-3.3-70b-versatile
  max_tokens: 1024
  temperature: 0.7

search:
  # SearxNG: primary workhorse for raw web results. Self-hosted, free, unlimited.
  #   docker run -d -p 8888:8080 --name searxng searxng/searxng
  # (8888 host → 8080 container to avoid clashing with common 8080 apps)
  searxng_url: http://localhost:8888
  # Tavily: used by deep_search for synthesis queries ("what is X", latest news, fact-checks).
  # Free tier: 1000 req/month. Get key at https://tavily.com, set TAVILY_API_KEY env var.
  tavily_api_key_env: TAVILY_API_KEY
  # DDG: last-resort fallback if both above fail (offline / docker down / no Tavily key).
  enable_ddg_fallback: true

proactive:
  enabled: true
  check_interval: 60
  morning_briefing: true
  todo_reminders: true
  focus_suggestions: true

workspace_modes:
  office:
    description: Opens office tools and communication apps
    steps:
      - tool: open_project
        params:
          project: office
      - tool: open_url
        params:
          url: https://mail.google.com
          browser: Brave Browser
      - tool: open_url
        params:
          url: https://calendar.google.com
          browser: Brave Browser

  focus:
    description: Deep work mode with IDE and music
    steps:
      - tool: open_project
        params:
          project: codejam
      - tool: youtube_search
        params:
          query: focus playlist
      - tool: open_notes
        params: {}

  evening:
    description: Wind-down mode with personal projects
    steps:
      - tool: open_project
        params:
          project: personal
      - tool: open_url
        params:
          url: https://news.ycombinator.com
          browser: Brave Browser
      - tool: youtube_search
        params:
          query: chill vibes playlist


observer:
  platform: macos
  poll_interval_ms: 800
  capture_frontmost_window: true
  capture_browser_tab: true
  capture_clipboard: true
